<!DOCTYPE html>
<html>
  <head>
    <title>css with state change</title>
    <link rel="stylesheet" href="test.css">
  </head>
  <body>

    <button class="amazon-button">Add to Cart</button>
    <br>

    <button class="uber-request-button">Request now</button>
    <button class="uber-schedule-button">Schedule for later</button>
    <br>

    <button class="button js-gaming" onclick="
      toggle('.js-gaming');
    ">Gaming</button>
    <button class="button js-music" onclick="
      toggle('.js-music');
    ">Music</button>
    <button class="button js-tech" onclick="
      toggle('.js-tech');
    ">Tech</button>
    <br>

    <input placeholder="enter the value" class="input" onkeydown="keypress(event);">
    <button class="calculate" onclick="calculate();">Calculate</button>
    <p class="shipping-result"></p>
    <p class="error-message"></p>


    <script src="test.js"></script>
  </body>
</html>
