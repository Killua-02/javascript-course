<!DOCTYPE html>
<html>
  <head>
    <title>advanced function</title>
  </head>
  <body>
    <script>
      const multiply=(a,b)=>a*b;
      console.log(multiply(2,3));
      console.log(multiply(7,10));

      function countPositiveNums(nums){
        let counter=0;
        nums.forEach((a)=>{
          if(a>0){
            counter++;
          }
        });
        return counter;
      }
      console.log(countPositiveNums([1,-3,5]));
      console.log(countPositiveNums([-2,3,-5,7,10]));

      function addNum(array,num){
        return array.map((a)=>a+num);
      }
      console.log(addNum([1,2,3],2));
      console.log(addNum([-2,-1,0,99],2));

      function removeEgg(food){
        let removedegg=0;
        return food.filter((a)=>{
          if(a==='egg' && removedegg<2){
            removedegg++;
            return false;
          }else return true;
        });
      }
      console.log(removeEgg(['egg','apple','egg','egg','ham']));

    </script>
  </body>
</html>
