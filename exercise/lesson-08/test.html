<!DOCTYPE html>
<html>
  <head>
    <title>objects</title>
  </head>
  <body>
    <script>
      const product={
        name: 'basketball',
        price:2095
      };
      console.log(product);
      product.price +=500;
      console.log(product);

      product['delivery-time']='3 days';
      console.log(product);

      function compareProducts(product1,product2){
        if(product1.price<product2.price){
          return product1;
        }else return product2;
      }
      const product1={
        name:'ball',
        price:100
      };
      const product2={
        name:'bat',
        price:200
      };
      console.log(compareProducts(product1,product2));

      const product3={
        name:'shirt',
        price:300
      };

      const product4={
        name:'shirt',
        price:300
      };

      function isSameProduct(product3,product4){
        if(product3.name===product4.name && product3.price===product4.price){
          return true;
        }else return false;
      }
      console.log(isSameProduct(product3,product4));

      console.log('GOOD Morning'.toLowerCase());

      console.log('hello '.repeat(3));

    </script>
  </body>
</html>
