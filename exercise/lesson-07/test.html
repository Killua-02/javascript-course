    <script>
      let cartQuantity = 0;
      function updateCartQuantity(value){
        if (cartQuantity + value > 10) {
        alert('The cart is full');
        return;
        }

        if (cartQuantity + value < 0) {
        alert('Not enough items in the cart');
        }

        cartQuantity += value;
        console.log(`Cart quantity: ${cartQuantity}`);
      }






      let calculate='';
      function calculation(value){
        calculate += value;
        console.log(calculate);
      }

      function greet(name){
        if(!name){ 
          console.log('hi there');
        }else
        console.log(`hello ${name}`);
      }
      greet();
      greet();
      greet();
      greet('rohan');

      function convertToFahrenheit(c){
        let f=(c*9/5)+32;
        console.log(f);
      }
      convertToFahrenheit(25);

      function convertToCelsius(f){
        let c=(f-32)*5/9;
        console.log(c);
      }
      convertToCelsius(86);

      function convertTemperature(degree, unit){
        if(unit=='c'){
          return convertToFahrenheit(degree);
        }else if(unit=='f'){
          return convertToCelsius(degree);
        }
      }
      convertTemperature(25,'c');
      convertTemperature(86,'f');

      function convertLength(length,from, to){
        if(from!=='km' && from!=='miles' && from!=='feet'){
        return `invalid unit: ${from}`;
        }else if(to!=='km' && to!=='miles' && to!=='feet'){
          return `inavlid unit: ${to}`;
        }

        if(from=='miles' && to=='km'){
          return `${length*1.6} ${to}`;
        }else if(from=='miles' && to=='feet'){
          return `${length*5280} ${to}`
        }else if(from=='km' && to=='miles'){
          return `${length/1.6} ${to}`;
        }else if(from=='km' && to=='feet'){
          return `${length*3281} ${to}`;
        }else if(from=='feet' && to=='miles'){
          return `${length/5280} ${from}`;
        }else if(from=='feet' && to=='km'){
          return `${length/3281} ${from}`;
        }else if(from===to){
          return `${length} ${from}`;
        }
      }
      console.log(convertLength(50,'miles','km'));
      console.log(convertLength(32,'km','miles'));
      console.log(convertLength(32,'km','km'));
      console.log(convertLength(50,'miles','miles'));
      console.log(convertLength(5,'miles','km'));
      console.log(convertLength(5,'miles','feet'));
      console.log(convertLength(5,'km','feet'));
      console.log(convertLength(5,'lbs','lbs'));
    </script>
