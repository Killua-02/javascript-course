<!DOCTYPE html>
<html>
  <head>
    <title>arrays</title>
  </head>
  <body>
    <script>
      const nums=[10,20,30];
      console.log(nums);
      nums[2]=99;
      console.log(nums);

      function getLastValue(array){
        const lastIndex=array.length-1;
        return array[lastIndex];
      }
      console.log(getLastValue([1,2,3]));
      console.log(getLastValue(['hi','hello','there']));

      function arraySwap(array){
        const lastIndex=array.length-1;
        let a=array[0];
        array[0]=array[lastIndex];
        array[lastIndex]=a;
        return array;
      }
      console.log(arraySwap([1,2,3]));
      console.log(arraySwap(['hi','hello','there']));

      for(let i=0;i<=10;i+=2){
        console.log(i);
      }

      for(let i=5;i>=0;i--){
        console.log(i);
      }

      let i=0;
      while(i<=10){
        console.log(i);
        i+=2;
      }

      i=5;
      while(i>=0){
        console.log(i);
        i--;
      }

      const array=[1,2,3];
      let result=[];
      for(let i=0;i<array.length;i++){
        result[i]=array[i]+1;
      }
      console.log(result);

      function addOne(array){
        for(let i=0;i<array.length;i++){
          result[i]=array[i]+1;
        }
        return result;
      }
      console.log(addOne([1,2,3]));
      console.log(addOne([-2,-1,0,99]));

      result=[];
      function addNum(array,num){
        for(let i=0;i<array.length;i++){
          result[i]=array[i]+num;
        }
        return result;
      }
      console.log(addNum([1,2,3],2));
      console.log(addNum([1,2,3],3));
      console.log(addNum([-2,-1,0,99],2));

      result=[];
      function addArrays(array1,array2){
        for(let i=0;i<array1.length;i++){
          result[i]=array1[i]+array2[i];
        }
        return result;
      }
      console.log(addArrays([1,1,2],[1,1,3]));
      console.log(addArrays([1,2,3],[4,5,6]));

      function countPositive(nums){
      let counter=0;
        for(let i=0;i<nums.length;i++){
          if(nums[i]>0){
            counter++;
          }
        }
        return counter;
      }
      console.log(countPositive([1,-3,5]));
      console.log(countPositive([-2,3,-5,7,10]));

      function minMax(nums){
        const output={
        min:null,
        max:null
        };
        for(let i=0;i<nums.length;i++){
          if(output.min===null || output.min>nums[i]){
            output.min=nums[i];
          }
          if(output.max===null || output.max<nums[i]){
            output.max=nums[i];
          }
        }
        return output;
      }
      console.log(minMax([1,-3,5]));
      console.log(minMax([-2,3,-5,7,10]));
      console.log(minMax([]));
      console.log(minMax([3]));

      function countWords(words){
        const fruit={};
        for(let i=0;i<words.length;i++){
          if(!fruit[words[i]]){
            fruit[words[i]]=1;
          }else{
            fruit[words[i]]++;
          }
        }
        return fruit;
      }
      console.log(countWords(['apple','apple','apple','banana','banana']));





    </script>
  </body>
</html>
