<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button class='js-show-quantity' onclick="
      displayCartQuantity();
    ">Show Quantity</button>

    <button onclick="
      updateCartQuantity(1);
    ">Add to Cart</button>

    <button onclick="
      updateCartQuantity(2);
    ">+2</button>

    <button onclick="
      updateCartQuantity(3);
    ">+3</button>

    <button onclick="
      updateCartQuantity(4);
    ">+4</button>

    <button onclick="
      updateCartQuantity(5);
    ">+5</button>

    <button onclick="
      updateCartQuantity(-1);
    ">Remove from cart</button>

    <button onclick="
      updateCartQuantity(-2);
    ">-2</button>

    <button onclick="
      updateCartQuantity(-3);
    ">-3</button>

    <button class="js-reset-cart" onclick="
      cartQuantity = 0;
      displayCartQuantity();
    ">Reset Cart</button>

    <p class="js-display"></p>

    <script>
      let cartQuantity = 0;
      
      displayCartQuantity();
      function displayCartQuantity(){
        document.querySelector('.js-display').innerHTML=`Cart quantity: ${cartQuantity}`;
      }

      function updateCartQuantity(change) {
        if (cartQuantity + change > 10) {
          alert('The cart is full');
          return;
        }

        if (cartQuantity + change < 0) {
          alert('Not enough items in the cart');
          return;
        }

        cartQuantity += change;
        displayCartQuantity();
      }
    </script>
  </body>
</html>
